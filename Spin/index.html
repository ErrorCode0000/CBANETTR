<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Me!</title>
    <style>
        /* Dışarıdaki tüm boşlukları, kenar paylarını ve kaydırma çubuklarını yok ediyoruz */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2c3e50;
            overflow: hidden; /* Çarkın dışındaki hiçbir şeye izin verme */
        }

        /* Çarkın ve ibrenin içinde duracağı konteyner */
        .wheel-container {
            position: relative;
            width: 90vmin;
            height: 90vmin;
            max-width: 500px;
            max-height: 500px;
        }

        /* Kusursuz çarkın tasarımı */
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* Çark dilimlerinin renkleri */
            background: conic-gradient(
                #e74c3c 0 60deg,
                #f1c40f 60deg 120deg,
                #2ecc71 120deg 180deg,
                #3498db 180deg 240deg,
                #9b59b6 240deg 300deg,
                #e67e22 300deg 360deg
            );
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
            border: 10px solid #ecf0f1;
            /* Dönüş animasyonunun pürüzsüzlüğü (Sürtünme hissi veren cubic-bezier) */
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); 
        }

        /* Üstteki seçici ibre */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ecf0f1;
            z-index: 10;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.4));
        }

        /* Merkezdeki çevirme butonu */
        .center-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background-color: #ecf0f1;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            font-weight: 900;
            font-size: 16px;
            color: #2c3e50;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 4px 10px rgba(0,0,0,0.3);
            z-index: 5;
            transition: transform 0.1s, background-color 0.2s;
            user-select: none;
        }

        /* Butona basılma efekti */
        .center-button:active {
            transform: translate(-50%, -50%) scale(0.95);
            background-color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="wheel-container">
        <div class="pointer"></div>
        
        <div class="wheel" id="wheel"></div>
        
        <div class="center-button" id="spinBtn">Spin!</div>
    </div>

    <script>
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        let currentRotation = 0;
        let isSpinning = false;

        spinBtn.addEventListener('click', () => {
            // Eğer çark zaten dönüyorsa, tekrar basılmasını engelle
            if (isSpinning) return;
            isSpinning = true;

            // Rastgele dönüş hesaplaması (En az 5, en fazla 10 tam tur döner)
            const extraSpins = Math.floor(Math.random() * 5) + 5; 
            // Seçilecek rastgele bir açı
            const randomDegree = Math.floor(Math.random() * 360); 
            
            // Mevcut dönüş açısının üzerine yeni dönüşü ekliyoruz ki her basışta kaldığı yerden devam etsin
            currentRotation += (extraSpins * 360) + randomDegree;

            // Çarkı CSS transform ile çeviriyoruz
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Animasyon süresi 4 saniye olduğu için, 4 saniye sonra tıklamaya tekrar izin veriyoruz
            setTimeout(() => {
                isSpinning = false;
            }, 4000);
        });
    </script>

</body>
</html>
