<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBA ENDLESS CHAOS TETRIS</title>
    <style>
        :root {
            --bg-color: #050505;
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ea;
            --neon-red: #ff003c;
            --neon-yellow: #fffb00;
            --neon-purple: #8a2be2;
            --neon-cyan: #00ffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        h1 {
            font-size: 2vw; 
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 1vh;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-blue); }
            5% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-blue); }
            10% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-blue); }
            15% { text-shadow: 0 0 10px var(--neon-blue); }
            100% { text-shadow: 0 0 10px var(--neon-blue); }
        }

        .game-wrapper {
            display: flex;
            gap: 2vw;
            background: rgba(10, 10, 10, 0.8);
            padding: 2vh 2vw;
            border: 2px solid var(--neon-pink);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 0, 234, 0.2), inset 0 0 20px rgba(255, 0, 234, 0.1);
            max-height: 90vh;
        }

        canvas#tetris {
            background-color: #000;
            border: 1px solid #333;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            height: 80vh; 
            aspect-ratio: 1 / 2; 
            width: auto;
        }

        .hud {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 15vw;
            min-width: 200px;
        }

        .info-box {
            background: #000;
            border: 1px solid var(--neon-blue);
            padding: 15px;
            border-radius: 5px;
            box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.2);
            margin-bottom: 15px;
        }

        .info-box h2 { font-size: 1.2rem; color: #aaa; margin-bottom: 5px; }
        .info-box p { font-size: 2rem; color: var(--neon-yellow); font-weight: bold; }
        
        #hold-status { font-size: 1.2rem; color: var(--neon-pink); }

        .controls-info, .special-legend {
            font-size: 0.85rem;
            color: #888;
            line-height: 1.5;
        }

        .controls-info span { color: var(--neon-pink); font-weight: bold; }
        
        .special-legend {
            padding: 10px;
            border: 1px dashed var(--neon-red);
            background: rgba(255, 0, 60, 0.1);
            overflow-y: auto;
        }
        .special-legend h3 { color: var(--neon-red); margin-bottom: 5px; font-size: 1rem;}
    </style>
</head>
<body>

    <h1>CBA Chaos Protocol</h1>

    <div class="game-wrapper">
        <canvas id="tetris" width="300" height="600"></canvas>
        
        <div class="hud">
            <div class="info-box">
                <h2>SCORE</h2>
                <p id="score">0</p>
            </div>

            <div class="info-box">
                <h2>HOLD (Press C)</h2>
                <p id="hold-status">EMPTY</p>
            </div>
            
            <div class="controls-info">
                <p><span>ARROWS</span> : Move/Drop</p>
                <p><span>UP</span> : Rotate</p>
                <p><span>SPACE</span> : Hard Drop</p>
                <p><span>C</span> : Hold Piece</p>
            </div>

            <div class="special-legend">
                <h3>SPECIALS</h3>
                <p><span style="color:var(--neon-red);">BOMB</span>: Destroys 3x3 area.</p>
                <p><span style="color:var(--neon-yellow);">NUKE</span>: Clears the board.</p>
                <p><span style="color:var(--neon-purple);">LASER</span>: Destroys column.</p>
                <p><span style="color:var(--neon-cyan);">FROST</span>: Slows time 5s.</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const holdElement = document.getElementById('hold-status');
        
        context.scale(30, 30);

        const colors = [
            null,
            '#FF0D72', // 1: T
            '#0DC2FF', // 2: I
            '#0DFF72', // 3: S
            '#F538FF', // 4: Z
            '#FF8E0D', // 5: L
            '#FFE138', // 6: J
            '#3877FF', // 7: O
            '#ff003c', // 8: BOMB 
            '#fffb00', // 9: NUKE 
            '#00ffff', // 10: FROST
            '#8a2be2'  // 11: LASER
        ];

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) { matrix.push(new Array(w).fill(0)); }
            return matrix;
        }

        const arena = createMatrix(10, 20);

        let heldPiece = null;
        let canHold = true;

        function drawMatrix(matrix, offset, isGhost = false) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = isGhost ? 'rgba(255, 255, 255, 0.2)' : colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        if (!isGhost) {
                            context.fillStyle = 'rgba(0,0,0,0.3)';
                            context.fillRect(x + offset.x, y + offset.y, 1, 1);
                            context.lineWidth = 0.05;
                            context.strokeStyle = 'rgba(255,255,255,0.2)';
                            context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                        }
                    }
                });
            });
        }

        function drawGhost() {
            const ghost = {
                matrix: player.matrix,
                pos: { x: player.pos.x, y: player.pos.y }
            };
            while (!collide(arena, ghost)) {
                ghost.pos.y++;
            }
            ghost.pos.y--;
            drawMatrix(ghost.matrix, ghost.pos, true);
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawGhost(); 
            drawMatrix(player.matrix, player.pos); 
        }

        function collide(arena, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function merge(arena, player) {
            let isBomb = false, isNuke = false, isFrost = false, isLaser = false;
            let targetX = 0, targetY = 0;

            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        if (value === 8) { isBomb = true; targetX = x + player.pos.x; targetY = y + player.pos.y; }
                        if (value === 9) isNuke = true;
                        if (value === 10) isFrost = true;
                        if (value === 11) { isLaser = true; targetX = x + player.pos.x; }
                        
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });

            if (isNuke) activateNuke();
            else if (isBomb) activateBomb(targetX, targetY);
            else if (isLaser) activateLaser(targetX);
            
            if (isFrost) activateFrost();
        }

        function activateBomb(cx, cy) {
            for(let y = cy - 1; y <= cy + 1; y++) {
                for(let x = cx - 1; x <= cx + 1; x++) {
                    if(y >= 0 && y < arena.length && x >= 0 && x < arena[0].length) arena[y][x] = 0;
                }
            }
            player.score += 500;
        }

        function activateNuke() {
            for (let y = 0; y < arena.length; y++) arena[y].fill(0);
            player.score += 2000;
            document.body.style.backgroundColor = '#fff';
            setTimeout(() => { document.body.style.backgroundColor = 'var(--bg-color)'; }, 100);
        }

        function activateLaser(col) {
            for(let y = 0; y < arena.length; y++) arena[y][col] = 0;
            player.score += 300;
        }

        function activateFrost() {
            dropInterval += 800; 
            document.querySelector('.game-wrapper').style.borderColor = "var(--neon-cyan)";
            setTimeout(() => { 
                dropInterval = Math.max(100, 1000 - (player.score * 0.05)); 
                document.querySelector('.game-wrapper').style.borderColor = "var(--neon-pink)";
            }, 5000);
        }

        function playerHold() {
            if (!canHold) return;
            if (heldPiece === null) {
                heldPiece = player.matrix;
                playerReset();
            } else {
                const temp = player.matrix;
                player.matrix = heldPiece;
                heldPiece = temp;
                player.pos.y = 0;
                player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            }
            holdElement.innerText = "STORED";
            canHold = false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 100;
                rowCount *= 2;
            }
        }

        function createPiece(type) {
            if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
            else if (type === 'O') return [[2, 2], [2, 2]];
            else if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            else if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
            else if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            else if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            else if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
            else if (type === 'BOMB') return [[8]]; 
            else if (type === 'NUKE') return [[9]]; 
            else if (type === 'FROST') return [[10]];
            else if (type === 'LASER') return [[11]];
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            const rand = Math.random();
            let type;
            
            if (rand < 0.02) type = 'NUKE'; 
            else if (rand < 0.07) type = 'LASER';
            else if (rand < 0.12) type = 'FROST';
            else if (rand < 0.20) type = 'BOMB'; 
            else type = pieces[pieces.length * Math.random() | 0];

            player.matrix = createPiece(type);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            canHold = true; 
            if(heldPiece !== null) holdElement.innerText = "READY";

            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                heldPiece = null;
                holdElement.innerText = "EMPTY";
                updateScore();
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            
            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            if(dropInterval < 1500) { 
                dropInterval = Math.max(100, 1000 - (player.score * 0.05)); 
            }
        }

        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) { playerMove(-1); } 
            else if (event.keyCode === 39) { playerMove(1); } 
            else if (event.keyCode === 40) { playerDrop(); } 
            else if (event.keyCode === 38) { playerRotate(1); } 
            else if (event.keyCode === 32) { 
                while (!collide(arena, player)) player.pos.y++;
                player.pos.y--;
                playerDrop();
            }
            else if (event.keyCode === 67) { 
                playerHold();
            }
        });

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
